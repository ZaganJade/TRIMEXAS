services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    image: trimexas-app:main
    container_name: trimexas-app
    restart: unless-stopped
    mem_limit: 384m
    cpus: "0.75"
    pids_limit: 128
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - path: .env
        required: false
    ports:
      - "127.0.0.1:${APP_FPM_PORT:-9083}:9000"
    volumes:
      - trimexas-storage:/var/www/storage
      - trimexas-cache:/var/www/bootstrap/cache
    networks:
      - trimexas
      - global-db-net
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(extension_loaded(\"pdo_pgsql\") ? 0 : 1);'"]
      interval: 30s
      timeout: 5s
      retries: 3

  queue-worker:
    image: trimexas-app:main
    container_name: trimexas-queue-worker
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--queue=seleksi,notifications", "--sleep=1", "--tries=3", "--timeout=300", "--memory=128"]
    mem_limit: 192m
    cpus: "0.35"
    pids_limit: 96
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - path: .env
        required: false
    volumes:
      - trimexas-storage:/var/www/storage
      - trimexas-cache:/var/www/bootstrap/cache
    networks:
      - trimexas
      - global-db-net
    depends_on:
      app:
        condition: service_healthy

networks:
  trimexas:
    name: trimexas
    driver: bridge
  global-db-net:
    external: true

volumes:
  trimexas-storage:
  trimexas-cache:
