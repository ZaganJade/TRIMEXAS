services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: trimexas-app
        working_dir: /var/www
        volumes:
            - .:/var/www
            - ./docker/php/php.ini:/usr/local/etc/php/conf.d/zz-app.ini:ro
        depends_on:
            postgres:
                condition: service_healthy
            mailpit:
                condition: service_started
        networks:
            - trimexas
        environment:
            APP_ENV: ${APP_ENV:-local}
            DB_CONNECTION: pgsql
            DB_HOST: postgres
            DB_PORT: 5432
            DB_DATABASE: ${DB_DATABASE:-trimexas}
            DB_USERNAME: ${DB_USERNAME:-trimexas}
            DB_PASSWORD: ${DB_PASSWORD:-trimexas}
            MAIL_MAILER: smtp
            MAIL_HOST: mailpit
            MAIL_PORT: 1025

    nginx:
        image: nginx:1.27-alpine
        container_name: trimexas-nginx
        ports:
            - "${APP_PORT:-8080}:80"
        volumes:
            - .:/var/www:ro
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app
        networks:
            - trimexas

    postgres:
        image: postgres:16-alpine
        container_name: trimexas-postgres
        ports:
            - "${DB_PORT_HOST:-5432}:5432"
        environment:
            POSTGRES_DB: ${DB_DATABASE:-trimexas}
            POSTGRES_USER: ${DB_USERNAME:-trimexas}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-trimexas}
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-trimexas} -d ${DB_DATABASE:-trimexas}"]
            interval: 5s
            timeout: 3s
            retries: 10
        networks:
            - trimexas

    mailpit:
        image: axllent/mailpit:latest
        container_name: trimexas-mailpit
        ports:
            - "${MAIL_UI_PORT:-8025}:8025"
            - "${MAIL_SMTP_PORT:-1025}:1025"
        networks:
            - trimexas

    vite:
        image: node:20-alpine
        container_name: trimexas-vite
        working_dir: /var/www
        command: sh -c "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0"
        ports:
            - "${VITE_PORT:-5173}:5173"
        volumes:
            - .:/var/www
        networks:
            - trimexas
        profiles: ["dev"]

volumes:
    postgres-data:

networks:
    trimexas:
        driver: bridge
